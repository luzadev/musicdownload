name: Build MusicDownload

on:
  workflow_dispatch:  # Lancia manualmente da GitHub
  push:
    tags:
      - 'v*'  # Builda automaticamente sui tag (es. v1.0.0)

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build app
        run: python build_macos.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicDownload-macOS
          path: dist/MusicDownload.app
          compression-level: 9

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: python build_windows.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicDownload-Windows
          path: dist/MusicDownload
          compression-level: 9
